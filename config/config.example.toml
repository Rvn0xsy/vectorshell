# VectorShell example configuration (safe to commit)
# Copy this file to `config/config.toml` and fill in real values.

[server]
# Shared listen address for WebSocket + HTTP API
listen = "0.0.0.0:8080"
# WebSocket endpoint path
ws_path = "/ws"
# URL path for the frontend dashboard (default: /ui)
ui_path = "/ui"
# Path to the built frontend dist directory (if not set, frontend is not served)
ui_dist = "dashboard/dist"

[tls]
# Set true to enable TLS for both WebSocket (wss://) and HTTP API (https://)
enabled = false
# PEM certificate path (used when enabled=true)
cert_path = "config/certs/cert.pem"
# PEM private key path (used when enabled=true)
key_path = "config/certs/key.pem"

[agent]
# LLM model name
model = "gpt-5.2-codex"
# Optional OpenAI-compatible endpoint
base_url = "https://api.openai.com/v1"
# Leave empty in repo; set real key locally or via env
api_key = ""

[client]
# Default callback address embedded into generated clients
default_server = "ws://127.0.0.1:8080/ws"
# Reconnect interval (seconds)
reconnect_interval = 5
# For self-signed cert testing with wss://
insecure_tls = false

[auth]
# API token used by dashboard/curl Authorization header
api_token = "change-me-strong-random-api-token"
# Client token embedded into generated client for WS registration
client_token = "change-me-strong-random-client-token"
