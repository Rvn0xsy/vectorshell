name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Build and test server ───────────────────────────────────────────────
  build-server:
    name: Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: GOFLAGS=-mod=readonly go test ./...

      - name: Build server
        run: GOFLAGS=-mod=readonly go build -o vectorshell-server ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: vectorshell-server

  # ─── Build clients for all supported targets ─────────────────────────────
  build-client:
    name: Client (${{ matrix.asset_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: vectorshell-client-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: vectorshell-client-linux-arm64
          - goos: windows
            goarch: amd64
            asset_name: vectorshell-client-windows-amd64.exe
          - goos: windows
            goarch: arm64
            asset_name: vectorshell-client-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            asset_name: vectorshell-client-macos-amd64
          - goos: darwin
            goarch: arm64
            asset_name: vectorshell-client-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          CGO_ENABLED=0 GOFLAGS=-mod=readonly go build \
            -trimpath \
            -ldflags "-s -w -X github.com/arch/vectorshell-go/internal/embedded.ServerURL=ws://127.0.0.1:8080/ws -X github.com/arch/vectorshell-go/internal/embedded.ClientToken=change-me-client-token -X github.com/arch/vectorshell-go/internal/embedded.ReconnectInterval=5" \
            -o "$ASSET_NAME" \
            ./cmd/client

      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  # ─── Build frontend ───────────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix dashboard

      - name: Build frontend
        run: npm run build --prefix dashboard

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dashboard/dist

  # ─── Package & publish release ───────────────────────────────────────────
  release:
    name: Publish
    needs: [build-server, build-client, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ── Server ──────────────────────────────────────────────────────────
      - name: Prepare server binary
        run: |
          mkdir -p release
          cp artifacts/server-binary/vectorshell-server release/
          chmod +x release/vectorshell-server

      # ── Client binaries ──────────────────────────────────────────────────
      - name: Organize client binaries
        run: |
          mkdir -p release/clients
          for dir in artifacts/client-*; do
            cp "$dir"/* release/clients/
          done
          ls -la release/clients/

      # ── Config files ─────────────────────────────────────────────────────
      - name: Copy config files
        run: |
          cp config.example.toml release/
          cp SOUL.md release/

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Copy frontend dist
        run: |
          mkdir -p release/dashboard/dist
          cp -r artifacts/frontend-dist/. release/dashboard/dist/

      # ── README ───────────────────────────────────────────────────────────
      - name: Create README
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release/README.md << EOF
          # VectorShell v${TAG_NAME}

          Binary release. For source and documentation, see the main repository.

          ## Contents

          - \`vectorshell-server\` — Server binary (Linux x86_64)
          - \`config.example.toml\` — Example server configuration
          - \`SOUL.md\` — Default agent instruction file
          - \`clients/\` — Pre-built client binaries for all supported platforms
          - \`dashboard/dist/\` — Pre-built frontend assets served at \`/ui\`

          ## Quick Start

          1. Copy \`config.example.toml\` to \`config.toml\` and fill in your values.
          2. Edit \`SOUL.md\` or point \`agent.soul_path\` to another file if needed.
          3. Run the server: \`./vectorshell-server -config ./config.toml\`
          4. Keep \`ui_dist = "dashboard/dist"\` if you want the server to serve the bundled frontend.
          5. Copy the matching client binary from \`clients/\` to your target host and run it with \`-config ./config.toml\`.

          ## Frontend

          The included frontend assets are already arranged for the default server config.
          Start the server and open the \`/ui\` path in your browser.
          EOF

      # ── Create archive ───────────────────────────────────────────────────
      - name: Create archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tar -czvf vectorshell-${TAG_NAME}.tar.gz -C release .
          ls -lh vectorshell-${TAG_NAME}.tar.gz

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vectorshell-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
