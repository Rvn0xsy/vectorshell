name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Build server binaries ────────────────────────────────────────────
  build-server:
    name: Server (${{ matrix.asset_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: vectorshell-server-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: vectorshell-server-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w" \
            -o "${{ matrix.asset_name }}" \
            ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  # ─── Build frontend ───────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix dashboard

      - name: Build
        run: npm run build --prefix dashboard

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dashboard/dist

  # ─── Package & publish release ────────────────────────────────────────
  release:
    name: Publish
    needs: [build-server, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ── Assemble release directory ───────────────────────────────────
      - name: Assemble release
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p release

          # Server binaries (per-platform)
          for dir in artifacts/server-*; do
            cp "$dir"/* release/
          done
          chmod +x release/vectorshell-server-*

          # Client source code (for runtime go build via /api/clients/generate)
          mkdir -p release/src
          cp -r cmd          release/src/
          cp -r internal     release/src/
          cp    go.mod       release/src/
          cp    go.sum       release/src/

          # Runtime assets
          cp    config.example.toml  release/
          cp    SOUL.md              release/
          cp -r skills               release/

          # Pre-built dashboard
          mkdir -p release/dashboard/dist
          cp -r artifacts/frontend-dist/. release/dashboard/dist/

          # Release README
          cat > release/README.md << 'RELEOF'
          # VectorShell ${TAG_NAME}

          ## Contents

          | Path | Description |
          |------|-------------|
          | `vectorshell-server-*` | Server binaries (linux/amd64, linux/arm64) |
          | `src/` | Client Go source — used by `/api/clients/generate` at runtime |
          | `config.example.toml` | Example configuration |
          | `SOUL.md` | Default agent instruction file |
          | `skills/` | Agent skill documents |
          | `dashboard/dist/` | Pre-built frontend (served at `/ui`) |

          ## Quick Start

          ```
          # 1. Choose your server binary and make it executable
          chmod +x vectorshell-server-linux-amd64

          # 2. Copy and edit config
          cp config.example.toml config.toml
          # Edit: set agent.api_key, auth.api_token, auth.client_token

          # 3. Run
          ./vectorshell-server-linux-amd64 -config ./config.toml
          ```

          The server uses `src/` to cross-compile client binaries on demand.
          Keep `src/` alongside the server binary (same working directory).
          RELEOF

      # ── Create archive ────────────────────────────────────────────────
      - name: Create archive
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tar -czvf "vectorshell-${TAG_NAME}.tar.gz" -C release .
          sha256sum "vectorshell-${TAG_NAME}.tar.gz" > "vectorshell-${TAG_NAME}.tar.gz.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vectorshell-${{ github.ref_name }}.tar.gz
            vectorshell-${{ github.ref_name }}.tar.gz.sha256
          generate_release_notes: true
